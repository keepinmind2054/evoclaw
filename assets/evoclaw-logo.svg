<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#162030"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="110%" y2="100%">
      <stop offset="0%" stop-color="#ff6a30"/>
      <stop offset="60%" stop-color="#e03010"/>
      <stop offset="100%" stop-color="#a01808"/>
    </linearGradient>
    <linearGradient id="orangeH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a30"/>
      <stop offset="100%" stop-color="#cc2a10"/>
    </linearGradient>
    <filter id="bodyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowO" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowC" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="18" fill="url(#bg)"/>
  <rect width="900" height="300" rx="18" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.14"/>

  <!-- Corner circuit decorations -->
  <g stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.35">
    <polyline points="20,55 20,20 55,20"/>
    <circle cx="55" cy="20" r="3" fill="#00e5ff"/>
    <polyline points="880,55 880,20 845,20"/>
    <circle cx="845" cy="20" r="3" fill="#00e5ff"/>
    <polyline points="20,245 20,280 55,280"/>
    <circle cx="55" cy="280" r="3" fill="#00e5ff"/>
    <polyline points="880,245 880,280 845,280"/>
    <circle cx="845" cy="280" r="3" fill="#00e5ff"/>
  </g>

  <!-- ═══ MINI E ICON (left) ═══ -->
  <rect x="45" y="58" width="36" height="184" rx="12" fill="url(#orange)" filter="url(#bodyGlow)"/>
  <rect x="45" y="58" width="138" height="40" rx="12" fill="url(#orangeH)" filter="url(#bodyGlow)"/>
  <rect x="45" y="120" width="110" height="40" rx="12" fill="url(#orangeH)" filter="url(#bodyGlow)"/>
  <rect x="45" y="182" width="138" height="40" rx="12" fill="url(#orangeH)" filter="url(#bodyGlow)"/>

  <!-- Sheen -->
  <rect x="45" y="58" width="36" height="184" rx="12" fill="url(#highlight)"/>
  <rect x="45" y="58" width="138" height="40" rx="12" fill="url(#highlight)"/>
  <rect x="45" y="120" width="110" height="40" rx="12" fill="url(#highlight)"/>
  <rect x="45" y="182" width="138" height="40" rx="12" fill="url(#highlight)"/>

  <!-- Circuit line -->
  <g opacity="0.65" filter="url(#dotGlow)">
    <line x1="66" y1="78" x2="66" y2="202" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="66" cy="78" r="3" fill="#00e5ff"/>
    <circle cx="66" cy="140" r="3" fill="#00e5ff"/>
    <circle cx="66" cy="202" r="3" fill="#00e5ff"/>
  </g>
  <!-- Tips -->
  <circle cx="183" cy="78" r="9" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="183" cy="78" r="5" fill="#fff" opacity="0.75"/>
  <circle cx="155" cy="140" r="8" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="155" cy="140" r="4.5" fill="#fff" opacity="0.65"/>
  <circle cx="183" cy="202" r="9" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="183" cy="202" r="5" fill="#fff" opacity="0.75"/>

  <!-- Vertical divider -->
  <line x1="215" y1="45" x2="215" y2="255" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "Evo" orange -->
  <text x="238" y="182"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="100" letter-spacing="-3"
        fill="#ff6a30" filter="url(#glowO)">Evo</text>
  <!-- "Claw" cyan — measure: Courier New 100px, "Evo"≈175px wide → start at 238+175=413 -->
  <text x="410" y="182"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="100" letter-spacing="-3"
        fill="#00e5ff" filter="url(#glowC)">Claw</text>

  <!-- Subtitle -->
  <text x="238" y="222"
        font-family="'Courier New', Courier, monospace"
        font-size="12.5" letter-spacing="3.2"
        fill="#00e5ff" opacity="0.6">AI AGENT · MULTI-LAYER MEMORY · EVOLUTION ENGINE</text>

  <!-- Version / badge row -->
  <text x="238" y="256"
        font-family="'Courier New', Courier, monospace"
        font-size="11" letter-spacing="2.2"
        fill="#ff6a30" opacity="0.45">MIT  ·  PYTHON 3.11+  ·  EVOCLAW</text>

  <!-- Right accent — circuit nodes grid -->
  <g stroke="#00e5ff" stroke-width="1.2" fill="none" opacity="0.25">
    <line x1="840" y1="100" x2="870" y2="100"/>
    <line x1="840" y1="130" x2="870" y2="130"/>
    <line x1="840" y1="160" x2="870" y2="160"/>
    <line x1="840" y1="190" x2="870" y2="190"/>
    <line x1="855" y1="100" x2="855" y2="190"/>
    <circle cx="840" cy="100" r="3" fill="#00e5ff"/>
    <circle cx="840" cy="130" r="3" fill="#00e5ff"/>
    <circle cx="840" cy="160" r="3" fill="#00e5ff"/>
    <circle cx="840" cy="190" r="3" fill="#00e5ff"/>
    <circle cx="870" cy="100" r="3" fill="#00e5ff"/>
    <circle cx="870" cy="130" r="3" fill="#00e5ff"/>
    <circle cx="870" cy="160" r="3" fill="#00e5ff"/>
    <circle cx="870" cy="190" r="3" fill="#00e5ff"/>
  </g>
</svg>
