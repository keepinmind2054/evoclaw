<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <radialGradient id="bg" cx="25%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#132030"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <linearGradient id="cg" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#ff7040"/>
      <stop offset="55%" stop-color="#e03020"/>
      <stop offset="100%" stop-color="#8c1010"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9060" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8c1010" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="banner"><rect width="900" height="300" rx="18"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="18" fill="url(#bg)"/>

  <!-- Grid -->
  <g clip-path="url(#banner)" opacity="0.03" stroke="#00e5ff" stroke-width="1">
    <line x1="0" y1="75"  x2="900" y2="75"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Circuit decoration right edge -->
  <g filter="url(#glow)" opacity="0.38" stroke="#00e5ff" stroke-width="1.4" fill="none">
    <polyline points="875,28 848,28 848,55 818,55"/>
    <circle cx="875" cy="28" r="2.5" fill="#00e5ff"/>
    <circle cx="818" cy="55" r="2.5" fill="#00e5ff"/>
    <polyline points="875,235 842,235 842,262 812,262"/>
    <circle cx="875" cy="235" r="2.5" fill="#00e5ff"/>
    <circle cx="812" cy="262" r="2.5" fill="#00e5ff"/>
  </g>

  <!-- ===== CLAW (left section, scaled 0.52 from icon v9) ===== -->
  <!-- icon v9 body: cx=296,cy=252,rx=148,ry=118 at 512x512 -->
  <!-- scale to fit 300px height: 300/512 = 0.586, translate into position -->
  <g transform="translate(10, 6) scale(0.565)">
    <!-- Body -->
    <ellipse cx="296" cy="252" rx="148" ry="118"
             fill="url(#cg)" filter="url(#softglow)"/>
    <!-- Upper finger -->
    <path d="M 165,185 Q 110,148 52,138"
          stroke="url(#cg)" stroke-width="60" stroke-linecap="round" fill="none"
          filter="url(#softglow)"/>
    <!-- Lower finger -->
    <path d="M 165,319 Q 110,356 52,366"
          stroke="url(#cg)" stroke-width="56" stroke-linecap="round" fill="none"
          filter="url(#softglow)"/>
    <!-- Shine -->
    <ellipse cx="272" cy="210" rx="110" ry="68" fill="url(#shine)" transform="rotate(-8,272,210)"/>
    <!-- Circuit traces -->
    <g filter="url(#glow)" stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.88">
      <line x1="178" y1="252" x2="400" y2="252"/>
      <line x1="260" y1="252" x2="220" y2="198"/>
      <line x1="260" y1="252" x2="220" y2="306"/>
      <line x1="340" y1="252" x2="340" y2="210"/>
      <circle cx="178" cy="252" r="6" fill="#00e5ff"/>
      <circle cx="260" cy="252" r="4.5" fill="#00e5ff"/>
      <circle cx="340" cy="252" r="5" fill="#00e5ff"/>
      <circle cx="400" cy="252" r="6" fill="#00e5ff"/>
      <circle cx="220" cy="198" r="4" fill="#00e5ff"/>
      <circle cx="220" cy="306" r="4" fill="#00e5ff"/>
      <circle cx="340" cy="210" r="3.5" fill="#00e5ff"/>
    </g>
    <!-- Glowing tips -->
    <circle cx="52" cy="138" r="15" fill="#00e5ff" filter="url(#glow)" opacity="0.95"/>
    <circle cx="52" cy="366" r="14" fill="#00e5ff" filter="url(#glow)" opacity="0.95"/>
  </g>

  <!-- Vertical separator line -->
  <line x1="295" y1="30" x2="295" y2="270" stroke="#00e5ff" stroke-width="1" opacity="0.12"/>

  <!-- ===== TEXT (right section) ===== -->
  <g filter="url(#textGlow)">
    <text x="590" y="148" text-anchor="middle"
          font-family="'Courier New', Courier, monospace"
          font-size="100" font-weight="bold" letter-spacing="2">
      <tspan fill="#ff6535">Evo</tspan><tspan fill="#00e5ff">Claw</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <text x="590" y="188" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12.5" fill="#546e7a" letter-spacing="5">
    AI AGENT  ·  MEMORY  ·  EVOLUTION ENGINE
  </text>

  <!-- DNA helix under subtitle -->
  <g transform="translate(488,212)" opacity="0.32" filter="url(#glow)">
    <path d="M0,0 C9,11 18,11 27,0 C36,-11 45,-11 54,0 C63,11 72,11 81,0 C90,-11 99,-11 108,0 C117,11 126,11 135,0 C144,-11 153,-11 162,0 C171,11 180,11 189,0 C198,-11 207,-11 216,0"
          stroke="#00e5ff" stroke-width="1.3" fill="none"/>
    <path d="M0,17 C9,6 18,6 27,17 C36,28 45,28 54,17 C63,6 72,6 81,17 C90,28 99,28 108,17 C117,6 126,6 135,17 C144,28 153,28 162,17 C171,6 180,6 189,17 C198,28 207,28 216,17"
          stroke="#4fc3f7" stroke-width="1.3" fill="none"/>
    <line x1="13" y1="3" x2="13" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="27" y1="0" x2="27" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="40" y1="3" x2="40" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="54" y1="0" x2="54" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="67" y1="3" x2="67" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="81" y1="0" x2="81" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="94" y1="3" x2="94" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="108" y1="0" x2="108" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="121" y1="3" x2="121" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="135" y1="0" x2="135" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="148" y1="3" x2="148" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="162" y1="0" x2="162" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="175" y1="3" x2="175" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="189" y1="0" x2="189" y2="17" stroke="#7ec8e3" stroke-width="0.9"/>
    <line x1="202" y1="3" x2="202" y2="14" stroke="#7ec8e3" stroke-width="0.9"/>
  </g>

  <!-- Version -->
  <text x="590" y="262" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#00e5ff" letter-spacing="4" opacity="0.4">
    v1.0  ·  MIT  ·  PYTHON 3.11+
  </text>

  <!-- Border -->
  <rect width="900" height="300" rx="18" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.14"/>
</svg>
