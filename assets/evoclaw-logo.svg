<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#132030"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6535"/>
      <stop offset="55%" stop-color="#dd2a10"/>
      <stop offset="100%" stop-color="#9b1010"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="banner">
      <rect width="900" height="300" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="18" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#banner)" opacity="0.035" stroke="#00e5ff" stroke-width="1">
    <line x1="0" y1="75"  x2="900" y2="75"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Circuit decoration left edge -->
  <g filter="url(#glow)" opacity="0.4" stroke="#00e5ff" stroke-width="1.5" fill="none">
    <polyline points="22,35 50,35 50,60 80,60"/>
    <circle cx="22" cy="35" r="3" fill="#00e5ff"/>
    <circle cx="80" cy="60" r="3" fill="#00e5ff"/>
    <polyline points="22,240 55,240 55,265 85,265"/>
    <circle cx="22" cy="240" r="3" fill="#00e5ff"/>
    <circle cx="85" cy="265" r="3" fill="#00e5ff"/>
  </g>

  <!-- Circuit decoration right edge -->
  <g filter="url(#glow)" opacity="0.4" stroke="#00e5ff" stroke-width="1.5" fill="none">
    <polyline points="878,35 850,35 850,60 820,60"/>
    <circle cx="878" cy="35" r="3" fill="#00e5ff"/>
    <circle cx="820" cy="60" r="3" fill="#00e5ff"/>
    <polyline points="878,240 845,240 845,265 815,265"/>
    <circle cx="878" cy="240" r="3" fill="#00e5ff"/>
    <circle cx="815" cy="265" r="3" fill="#00e5ff"/>
  </g>

  <!-- ── CLAW (left side, scaled for 300px height) ── -->
  <g transform="translate(148,148) scale(0.54)">

    <!-- Arm -->
    <path d="M 375,238 C 410,232 445,222 472,218"
          stroke="url(#claw)" stroke-width="58" stroke-linecap="round" fill="none"
          filter="url(#bigGlow)"/>

    <!-- Body -->
    <ellipse cx="310" cy="238" rx="88" ry="65"
             transform="rotate(-8,310,238)"
             fill="url(#claw)" filter="url(#bigGlow)"/>

    <!-- Upper finger -->
    <path d="M 244,192 C 212,168 166,140 110,114"
          stroke="url(#claw)" stroke-width="54" stroke-linecap="round" fill="none"
          filter="url(#bigGlow)"/>

    <!-- Lower finger -->
    <path d="M 244,284 C 208,304 160,330 106,358"
          stroke="url(#claw)" stroke-width="48" stroke-linecap="round" fill="none"
          filter="url(#bigGlow)"/>

    <!-- Negative space (bite) -->
    <path d="M 186,154 C 154,195 154,280 188,322"
          stroke="#06090f" stroke-width="30" stroke-linecap="round" fill="none"/>

    <!-- Circuit traces -->
    <g filter="url(#glow)" stroke="#00e5ff" stroke-width="2.5" fill="none" opacity="0.85">
      <line x1="212" y1="238" x2="392" y2="228"/>
      <line x1="260" y1="220" x2="230" y2="190"/>
      <line x1="260" y1="256" x2="228" y2="278"/>
      <line x1="342" y1="233" x2="342" y2="204"/>
      <circle cx="212" cy="238" r="5" fill="#00e5ff"/>
      <circle cx="260" cy="220" r="3.5" fill="#00e5ff"/>
      <circle cx="260" cy="256" r="3.5" fill="#00e5ff"/>
      <circle cx="342" cy="233" r="4" fill="#00e5ff"/>
      <circle cx="392" cy="228" r="5" fill="#00e5ff"/>
      <circle cx="342" cy="204" r="3" fill="#00e5ff"/>
    </g>

    <!-- Glowing tips -->
    <circle cx="110" cy="114" r="11" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
    <circle cx="106" cy="358" r="10" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>

  </g>

  <!-- ── Text ── -->
  <!-- Main title -->
  <g filter="url(#textGlow)">
    <text x="500" y="140" text-anchor="middle"
          font-family="'Courier New', Courier, monospace"
          font-size="96" font-weight="bold" letter-spacing="4">
      <tspan fill="#ff6535">Evo</tspan><tspan fill="#00e5ff">Claw</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="182" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#546e7a" letter-spacing="5">
    AI AGENT  ·  MULTI-LAYER MEMORY  ·  EVOLUTION ENGINE
  </text>

  <!-- DNA helix (bottom right decoration) -->
  <g transform="translate(620,240)" opacity="0.38" filter="url(#glow)">
    <path d="M0,0 C12,14 24,14 36,0 C48,-14 60,-14 72,0 C84,14 96,14 108,0 C120,-14 132,-14 144,0"
          stroke="#00e5ff" stroke-width="1.6" fill="none"/>
    <path d="M0,22 C12,8 24,8 36,22 C48,36 60,36 72,22 C84,8 96,8 108,22 C120,36 132,36 144,22"
          stroke="#4fc3f7" stroke-width="1.6" fill="none"/>
    <line x1="18" y1="4" x2="18" y2="18" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="36" y1="0" x2="36" y2="22" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="54" y1="4" x2="54" y2="18" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="72" y1="0" x2="72" y2="22" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="90" y1="4" x2="90" y2="18" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="108" y1="0" x2="108" y2="22" stroke="#7ec8e3" stroke-width="1.1"/>
    <line x1="126" y1="4" x2="126" y2="18" stroke="#7ec8e3" stroke-width="1.1"/>
  </g>

  <!-- Version / tag line -->
  <text x="500" y="268" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#00e5ff" letter-spacing="4" opacity="0.45">
    v1.0  ·  MIT  ·  PYTHON 3.11+
  </text>

  <!-- Border -->
  <rect width="900" height="300" rx="18" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.15"/>
</svg>
