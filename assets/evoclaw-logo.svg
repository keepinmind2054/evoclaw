<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <defs>
    <!-- Background gradient: deep ocean/space -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#0b1a2e"/>
    </linearGradient>
    <!-- Lobster body gradient: warm orange-red -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
    <!-- Claw gradient -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
    <!-- Glow filter for cyan circuit lines -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for lobster body -->
    <filter id="bodyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow for eyes -->
    <filter id="eyeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="900" height="360" fill="url(#bgGrad)" rx="16"/>

  <!-- Subtle grid lines (tech/circuit feel) -->
  <g opacity="0.04" stroke="#00e5ff" stroke-width="1">
    <line x1="0" y1="90"  x2="900" y2="90"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="270" x2="900" y2="270"/>
    <line x1="150" y1="0" x2="150" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="450" y1="0" x2="450" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="750" y1="0" x2="750" y2="360"/>
  </g>

  <!-- ── Circuit decoration: left side ──────────────────────── -->
  <g filter="url(#cyanGlow)" opacity="0.5" stroke="#00e5ff" stroke-width="1.5" fill="none">
    <polyline points="30,50 60,50 60,80 90,80"/>
    <circle cx="90" cy="80" r="3" fill="#00e5ff"/>
    <polyline points="30,110 50,110 50,140 80,140 80,170"/>
    <circle cx="30" cy="50" r="3" fill="#00e5ff"/>
    <circle cx="80" cy="170" r="3" fill="#00e5ff"/>
    <polyline points="30,250 70,250 70,290 110,290"/>
    <circle cx="110" cy="290" r="3" fill="#00e5ff"/>
    <polyline points="30,320 80,320 80,300"/>
    <circle cx="30" cy="320" r="3" fill="#00e5ff"/>
  </g>

  <!-- ── Circuit decoration: right side ─────────────────────── -->
  <g filter="url(#cyanGlow)" opacity="0.5" stroke="#00e5ff" stroke-width="1.5" fill="none">
    <polyline points="870,50 840,50 840,80 810,80"/>
    <circle cx="810" cy="80" r="3" fill="#00e5ff"/>
    <polyline points="870,110 850,110 850,150 820,150"/>
    <circle cx="820" cy="150" r="3" fill="#00e5ff"/>
    <polyline points="870,250 830,250 830,290 800,290"/>
    <circle cx="800" cy="290" r="3" fill="#00e5ff"/>
    <polyline points="870,320 820,320 820,300"/>
    <circle cx="870" cy="320" r="3" fill="#00e5ff"/>
  </g>

  <!-- ── LOBSTER (centered at 450, 160) ─────────────────────── -->
  <g transform="translate(450,155)" filter="url(#bodyGlow)">

    <!-- Tail fan -->
    <g stroke="#c62828" stroke-width="2" fill="none" opacity="0.9">
      <path d="M-8,95 Q-30,125 -28,148"/>
      <path d="M0,100 Q-6,130 0,152"/>
      <path d="M8,95 Q30,125 28,148"/>
      <path d="M-18,90 Q-50,115 -52,138"/>
      <path d="M18,90 Q50,115 52,138"/>
    </g>
    <!-- Tail fan tips -->
    <ellipse cx="-28" cy="150" rx="10" ry="6" fill="#c62828" opacity="0.85" transform="rotate(-15,-28,150)"/>
    <ellipse cx="0"   cy="154" rx="10" ry="6" fill="#c62828" opacity="0.85"/>
    <ellipse cx="28"  cy="150" rx="10" ry="6" fill="#c62828" opacity="0.85" transform="rotate(15,28,150)"/>
    <ellipse cx="-52" cy="140" rx="8"  ry="5" fill="#c62828" opacity="0.75" transform="rotate(-25,-52,140)"/>
    <ellipse cx="52"  cy="140" rx="8"  ry="5" fill="#c62828" opacity="0.75" transform="rotate(25,52,140)"/>

    <!-- Body segments (abdomen) -->
    <ellipse cx="0" cy="88"  rx="22" ry="12" fill="url(#bodyGrad)" stroke="#ff5722" stroke-width="0.5"/>
    <ellipse cx="0" cy="70"  rx="25" ry="13" fill="url(#bodyGrad)" stroke="#ff5722" stroke-width="0.5"/>
    <ellipse cx="0" cy="51"  rx="27" ry="13" fill="url(#bodyGrad)" stroke="#ff5722" stroke-width="0.5"/>
    <ellipse cx="0" cy="32"  rx="29" ry="14" fill="url(#bodyGrad)" stroke="#ff5722" stroke-width="0.5"/>

    <!-- Carapace (main shell) -->
    <ellipse cx="0" cy="8"   rx="36" ry="26" fill="url(#bodyGrad)" stroke="#ff7043" stroke-width="1"/>
    <!-- Head -->
    <ellipse cx="0" cy="-18" rx="28" ry="18" fill="url(#bodyGrad)" stroke="#ff7043" stroke-width="1"/>

    <!-- Circuit traces on body (evolution theme) -->
    <g filter="url(#cyanGlow)" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.7">
      <line x1="-18" y1="32" x2="18" y2="32"/>
      <line x1="-18" y1="51" x2="18" y2="51"/>
      <line x1="0"   y1="32" x2="0"  y2="18"/>
      <line x1="-12" y1="32" x2="-12" y2="51"/>
      <line x1="12"  y1="32" x2="12" y2="51"/>
      <circle cx="-12" cy="32" r="2" fill="#00e5ff"/>
      <circle cx="12"  cy="32" r="2" fill="#00e5ff"/>
      <circle cx="0"   cy="51" r="2" fill="#00e5ff"/>
      <circle cx="-12" cy="51" r="2" fill="#00e5ff"/>
      <circle cx="12"  cy="51" r="2" fill="#00e5ff"/>
    </g>

    <!-- Eyes (glowing cyan) -->
    <circle cx="-14" cy="-22" r="7" fill="#001a1a" stroke="#00e5ff" stroke-width="1.5" filter="url(#eyeGlow)"/>
    <circle cx=" 14" cy="-22" r="7" fill="#001a1a" stroke="#00e5ff" stroke-width="1.5" filter="url(#eyeGlow)"/>
    <circle cx="-14" cy="-22" r="3.5" fill="#00e5ff" opacity="0.9"/>
    <circle cx=" 14" cy="-22" r="3.5" fill="#00e5ff" opacity="0.9"/>
    <circle cx="-13" cy="-23" r="1.2" fill="#ffffff" opacity="0.8"/>
    <circle cx=" 15" cy="-23" r="1.2" fill="#ffffff" opacity="0.8"/>

    <!-- Eye stalks -->
    <line x1="-10" y1="-18" x2="-14" y2="-15" stroke="#c62828" stroke-width="2"/>
    <line x1=" 10" y1="-18" x2=" 14" y2="-15" stroke="#c62828" stroke-width="2"/>

    <!-- Antennae (long) -->
    <path d="M-18,-25 Q-55,-60 -95,-45" stroke="#ff7043" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d=" 18,-25 Q 55,-60  95,-45" stroke="#ff7043" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Short antennules -->
    <path d="M-12,-28 Q-30,-42 -25,-52" stroke="#ff8a65" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d=" 12,-28 Q 30,-42  25,-52" stroke="#ff8a65" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- ── LEFT CLAW ─────────────────────────── -->
    <g transform="translate(-70, -5) rotate(-25)">
      <!-- Arm -->
      <path d="M70,5 Q50,8 30,0" stroke="#e53935" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Merus/carpus -->
      <ellipse cx="22" cy="-2" rx="14" ry="10" fill="url(#clawGrad)" stroke="#ff5722" stroke-width="0.8"/>
      <!-- Propus (claw base) -->
      <ellipse cx="6" cy="-4" rx="18" ry="13" fill="url(#clawGrad)" stroke="#ff5722" stroke-width="0.8"/>
      <!-- Fixed finger -->
      <path d="M-10,-10 Q-28,-18 -32,-10" stroke="#b71c1c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Dactyl (movable finger) -->
      <path d="M-10,2 Q-26,8 -30,2" stroke="#c62828" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Claw tips -->
      <circle cx="-32" cy="-10" r="4" fill="#8b0000"/>
      <circle cx="-30" cy="2"  r="3.5" fill="#8b0000"/>
      <!-- Circuit on claw -->
      <g filter="url(#cyanGlow)" stroke="#00e5ff" stroke-width="0.8" fill="none" opacity="0.6">
        <line x1="0" y1="-4" x2="10" y2="-4"/>
        <circle cx="0" cy="-4" r="1.5" fill="#00e5ff"/>
      </g>
    </g>

    <!-- ── RIGHT CLAW ────────────────────────── -->
    <g transform="translate(70, -5) rotate(25) scale(-1,1)">
      <!-- Arm -->
      <path d="M70,5 Q50,8 30,0" stroke="#e53935" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Merus/carpus -->
      <ellipse cx="22" cy="-2" rx="14" ry="10" fill="url(#clawGrad)" stroke="#ff5722" stroke-width="0.8"/>
      <!-- Propus (claw base) -->
      <ellipse cx="6" cy="-4" rx="18" ry="13" fill="url(#clawGrad)" stroke="#ff5722" stroke-width="0.8"/>
      <!-- Fixed finger -->
      <path d="M-10,-10 Q-28,-18 -32,-10" stroke="#b71c1c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Dactyl -->
      <path d="M-10,2 Q-26,8 -30,2" stroke="#c62828" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="-32" cy="-10" r="4" fill="#8b0000"/>
      <circle cx="-30" cy="2"  r="3.5" fill="#8b0000"/>
      <g filter="url(#cyanGlow)" stroke="#00e5ff" stroke-width="0.8" fill="none" opacity="0.6">
        <line x1="0" y1="-4" x2="10" y2="-4"/>
        <circle cx="0" cy="-4" r="1.5" fill="#00e5ff"/>
      </g>
    </g>

    <!-- Walking legs: left side -->
    <g stroke="#e53935" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M-26,32 Q-45,48 -42,65"/>
      <path d="M-26,51 Q-46,65 -44,82"/>
      <path d="M-24,70 Q-42,82 -38,98"/>
      <path d="M-22,88 Q-36,98 -32,112"/>
    </g>
    <!-- Walking legs: right side -->
    <g stroke="#e53935" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M26,32 Q45,48 42,65"/>
      <path d="M26,51 Q46,65 44,82"/>
      <path d="M24,70 Q42,82 38,98"/>
      <path d="M22,88 Q36,98 32,112"/>
    </g>

  </g><!-- end lobster group -->

  <!-- ── DNA Double Helix (evolution symbol) ───────────────── -->
  <!-- Placed bottom-left, subtle -->
  <g transform="translate(115, 265)" opacity="0.55" filter="url(#cyanGlow)">
    <path d="M0,0 C15,15 30,15 45,0 C60,-15 75,-15 90,0 C105,15 120,15 135,0"
          stroke="#00e5ff" stroke-width="2" fill="none"/>
    <path d="M0,30 C15,15 30,15 45,30 C60,45 75,45 90,30 C105,15 120,15 135,30"
          stroke="#4fc3f7" stroke-width="2" fill="none"/>
    <!-- Rungs -->
    <line x1="22"  y1="7"  x2="22"  y2="23" stroke="#b0bec5" stroke-width="1.5" opacity="0.7"/>
    <line x1="45"  y1="0"  x2="45"  y2="30" stroke="#b0bec5" stroke-width="1.5" opacity="0.7"/>
    <line x1="68"  y1="7"  x2="68"  y2="23" stroke="#b0bec5" stroke-width="1.5" opacity="0.7"/>
    <line x1="90"  y1="0"  x2="90"  y2="30" stroke="#b0bec5" stroke-width="1.5" opacity="0.7"/>
    <line x1="112" y1="7"  x2="112" y2="23" stroke="#b0bec5" stroke-width="1.5" opacity="0.7"/>
    <!-- Node dots -->
    <circle cx="22"  cy="7"  r="2.5" fill="#00e5ff"/>
    <circle cx="22"  cy="23" r="2.5" fill="#4fc3f7"/>
    <circle cx="68"  cy="7"  r="2.5" fill="#00e5ff"/>
    <circle cx="68"  cy="23" r="2.5" fill="#4fc3f7"/>
    <circle cx="112" cy="7"  r="2.5" fill="#00e5ff"/>
    <circle cx="112" cy="23" r="2.5" fill="#4fc3f7"/>
    <!-- Evolution arrow -->
    <path d="M140,15 L158,15" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M152,9 L160,15 L152,21" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Evolution progression dots (right side) ────────────── -->
  <g transform="translate(630, 275)" opacity="0.6" filter="url(#cyanGlow)">
    <!-- Small to large circles = evolution -->
    <circle cx="0"   cy="25" r="4"  fill="#ff7043" opacity="0.7"/>
    <circle cx="22"  cy="20" r="6"  fill="#ff5722" opacity="0.8"/>
    <circle cx="48"  cy="14" r="9"  fill="#e53935" opacity="0.85"/>
    <circle cx="80"  cy="6"  r="13" fill="#c62828" opacity="0.9"/>
    <!-- Connecting line -->
    <path d="M0,25 Q20,18 22,20 Q38,14 48,14 Q62,10 80,6"
          stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Circuit nodes -->
    <circle cx="0"  cy="25" r="2" fill="#00e5ff"/>
    <circle cx="22" cy="20" r="2" fill="#00e5ff"/>
    <circle cx="48" cy="14" r="2" fill="#00e5ff"/>
    <circle cx="80" cy="6"  r="2" fill="#00e5ff"/>
    <!-- Label -->
    <text x="40" y="58" text-anchor="middle" font-family="'Courier New', monospace"
          font-size="10" fill="#4fc3f7" letter-spacing="2">EVOLVING</text>
  </g>

  <!-- ── Main Title: EvoClaw ─────────────────────────────────── -->
  <g filter="url(#textGlow)">
    <text x="450" y="315" text-anchor="middle"
          font-family="'Courier New', Courier, monospace"
          font-size="78" font-weight="bold" letter-spacing="6">
      <tspan fill="#ff6b35">Evo</tspan><tspan fill="#00e5ff">Claw</tspan>
    </text>
  </g>

  <!-- ── Subtitle ────────────────────────────────────────────── -->
  <text x="450" y="345" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#546e7a" letter-spacing="4">
    GEMINI-POWERED  ·  CONTAINER-ISOLATED  ·  100% PYTHON
  </text>

  <!-- ── Version badge ──────────────────────────────────────── -->
  <rect x="390" y="354" width="120" height="20" rx="10"
        fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <text x="450" y="368" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#00e5ff" letter-spacing="3" opacity="0.7">
    v1.0 · MIT
  </text>

</svg>
