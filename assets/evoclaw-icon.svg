<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#162030"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="110%" y2="100%">
      <stop offset="0%" stop-color="#ff6a30"/>
      <stop offset="60%" stop-color="#e03010"/>
      <stop offset="100%" stop-color="#a01808"/>
    </linearGradient>
    <linearGradient id="orangeH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a30"/>
      <stop offset="100%" stop-color="#cc2a10"/>
    </linearGradient>
    <filter id="bodyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.12"/>

  <!-- Vertical spine -->
  <rect x="108" y="96" width="72" height="320" rx="22" fill="url(#orange)" filter="url(#bodyGlow)"/>
  <!-- Top tine -->
  <rect x="108" y="96" width="268" height="70" rx="22" fill="url(#orangeH)" filter="url(#bodyGlow)"/>
  <!-- Middle tine -->
  <rect x="108" y="221" width="216" height="70" rx="22" fill="url(#orangeH)" filter="url(#bodyGlow)"/>
  <!-- Bottom tine -->
  <rect x="108" y="346" width="268" height="70" rx="22" fill="url(#orangeH)" filter="url(#bodyGlow)"/>

  <!-- Highlight sheen -->
  <rect x="108" y="96" width="72" height="320" rx="22" fill="url(#highlight)"/>
  <rect x="108" y="96" width="268" height="70" rx="22" fill="url(#highlight)"/>
  <rect x="108" y="221" width="216" height="70" rx="22" fill="url(#highlight)"/>
  <rect x="108" y="346" width="268" height="70" rx="22" fill="url(#highlight)"/>

  <!-- Circuit line on spine -->
  <g opacity="0.7" filter="url(#dotGlow)">
    <line x1="148" y1="131" x2="148" y2="381" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="148" cy="131" r="4.5" fill="#00e5ff"/>
    <circle cx="148" cy="256" r="4.5" fill="#00e5ff"/>
    <circle cx="148" cy="381" r="4.5" fill="#00e5ff"/>
    <line x1="148" y1="256" x2="324" y2="256" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- Glowing claw tips -->
  <circle cx="376" cy="131" r="18" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="376" cy="131" r="10" fill="#ffffff" opacity="0.7"/>
  <circle cx="324" cy="256" r="16" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="324" cy="256" r="9" fill="#ffffff" opacity="0.6"/>
  <circle cx="376" cy="381" r="18" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.95"/>
  <circle cx="376" cy="381" r="10" fill="#ffffff" opacity="0.7"/>
</svg>
