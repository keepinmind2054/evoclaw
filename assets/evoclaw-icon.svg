<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a2a40"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <linearGradient id="cg" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#ff7040"/>
      <stop offset="55%" stop-color="#e03020"/>
      <stop offset="100%" stop-color="#8c1010"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9060" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8c1010" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g opacity="0.035" stroke="#00e5ff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- ==== BIG CENTRAL BODY — fills the canvas, fingers extend left ==== -->

  <!-- Large body centered on canvas (propus) -->
  <ellipse cx="296" cy="252" rx="148" ry="118"
           fill="url(#cg)" filter="url(#softglow)"/>

  <!-- Upper finger: from left side of body, arc UP-LEFT to tip -->
  <path d="M 165,185 Q 110,148 52,138"
        stroke="url(#cg)" stroke-width="60" stroke-linecap="round" fill="none"
        filter="url(#softglow)"/>

  <!-- Lower finger: from left side of body, arc DOWN-LEFT to tip -->
  <path d="M 165,319 Q 110,356 52,366"
        stroke="url(#cg)" stroke-width="56" stroke-linecap="round" fill="none"
        filter="url(#softglow)"/>

  <!-- Shine highlight on body -->
  <ellipse cx="272" cy="210" rx="110" ry="68" fill="url(#shine)" transform="rotate(-8,272,210)"/>

  <!-- Circuit traces on body -->
  <g filter="url(#glow)" stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.9">
    <line x1="178" y1="252" x2="418" y2="252"/>
    <line x1="260" y1="252" x2="220" y2="198"/>
    <line x1="260" y1="252" x2="220" y2="306"/>
    <line x1="350" y1="252" x2="350" y2="206"/>
    <line x1="418" y1="252" x2="418" y2="210"/>
    <circle cx="178" cy="252" r="6" fill="#00e5ff"/>
    <circle cx="260" cy="252" r="4.5" fill="#00e5ff"/>
    <circle cx="350" cy="252" r="5" fill="#00e5ff"/>
    <circle cx="418" cy="252" r="6" fill="#00e5ff"/>
    <circle cx="220" cy="198" r="4" fill="#00e5ff"/>
    <circle cx="220" cy="306" r="4" fill="#00e5ff"/>
    <circle cx="350" cy="206" r="3.5" fill="#00e5ff"/>
    <circle cx="418" cy="210" r="3.5" fill="#00e5ff"/>
  </g>

  <!-- Glowing finger tips -->
  <circle cx="52" cy="138" r="15" fill="#00e5ff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="52" cy="366" r="14" fill="#00e5ff" filter="url(#glow)" opacity="0.95"/>

  <!-- DNA helix — small, bottom right -->
  <g transform="translate(348,412)" opacity="0.34" filter="url(#glow)">
    <path d="M0,0 C8,10 16,10 24,0 C32,-10 40,-10 48,0 C56,10 64,10 72,0 C80,-10 88,-10 96,0"
          stroke="#00e5ff" stroke-width="1.4" fill="none"/>
    <path d="M0,16 C8,6 16,6 24,16 C32,26 40,26 48,16 C56,6 64,6 72,16 C80,26 88,26 96,16"
          stroke="#4fc3f7" stroke-width="1.4" fill="none"/>
    <line x1="12" y1="3" x2="12" y2="13" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="24" y1="0" x2="24" y2="16" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="36" y1="3" x2="36" y2="13" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="48" y1="0" x2="48" y2="16" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="60" y1="3" x2="60" y2="13" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="72" y1="0" x2="72" y2="16" stroke="#7ec8e3" stroke-width="1"/>
    <line x1="84" y1="3" x2="84" y2="13" stroke="#7ec8e3" stroke-width="1"/>
  </g>

  <!-- Border -->
  <rect width="512" height="512" rx="80" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.2"/>
</svg>
